<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduAssistant{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #060a12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.3);
            --text: #e0e6f0;
            --text-dim: #a0b8d0;
            --purple: #7850ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 300px;
            background: linear-gradient(180deg, #0d1b2a 0%, #060a12 100%);
            border-right: 1px solid rgba(0, 229, 255, 0.1);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: fixed;
            height: 100vh;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav { display: flex; flex-direction: column; gap: 10px; }
        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-left: 300px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-card h3 { color: var(--text-dim); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 32px; font-weight: 700; margin-top: 5px; color: var(--accent); }

        /* Common panels */
        .panel {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            min-height: 500px;
            position: relative;
        }

        .history-panel {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 700px;
            overflow-y: auto;
        }

        .history-panel h2 { font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        .msg {
            padding: 15px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg.user { background: rgba(0, 229, 255, 0.05); border-left: 3px solid var(--accent); align-self: flex-start; width: 100%; }
        .msg.ai { background: rgba(120, 80, 255, 0.05); border-left: 3px solid var(--purple); align-self: flex-start; width: 100%; margin-top: 5px; }
        .msg small { display: block; margin-bottom: 5px; opacity: 0.5; font-size: 10px; text-transform: uppercase; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <h1><span>🎙️</span> ALEXA EDU</h1>
        </div>
        <div class="nav">
            <a href="{{ url_for('alexa') }}" class="nav-item {% if active=='alexa' %}active{% endif %}">🎙️ Voice Assistant</a>
            <a href="{{ url_for('history_page') }}" class="nav-item {% if active=='history' %}active{% endif %}">📚 History</a>
            <a href="{{ url_for('reports_page') }}" class="nav-item {% if active=='reports' %}active{% endif %}">📊 Reports</a>
            <a href="{{ url_for('quizzes_list') }}" class="nav-item {% if active=='quizzes' %}active{% endif %}">📝 Quizzes</a>
        </div>
        <div style="margin-top: auto; padding: 20px; background: rgba(0,229,255,0.05); border-radius: 15px;">
            <p style="font-size: 12px; color: var(--text-dim);">LOGGED IN AS</p>
            <p style="font-weight: 700; color: var(--accent);">{{ current_user.username }}</p>
            <a href="{{ url_for('logout') }}" style="color: var(--text-dim); text-decoration: none; font-size: 12px; display: block; margin-top: 10px;">Logout</a>
        </div>
    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
